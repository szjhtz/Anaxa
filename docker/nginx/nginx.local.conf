events {
    worker_connections 1024;
}
pid logs/nginx.pid;
http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging
    access_log logs/nginx-access.log;
    error_log logs/nginx-error.log;

    # Upstream servers (using 127.0.0.1 for local development)
    upstream gateway {
        server 127.0.0.1:6202;
    }

    upstream langgraph {
        server 127.0.0.1:6203;
    }

    upstream frontend {
        server 127.0.0.1:6201;
    }

    server {
        listen 6200;
        listen [::]:6200;
        server_name _;

        # Hide CORS headers from upstream to prevent duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # CORS: reflect the Host as allowed origin. Avoid "*" because it is
        # incompatible with credentialed requests (cookies); the reflection also
        # means cross-origin callers without the exact Origin header get rejected.
        add_header 'Access-Control-Allow-Origin' "$scheme://$host" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Medrix-Admin-Token' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Vary' 'Origin' always;

        # Handle OPTIONS requests (CORS preflight)
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Internal auth check used by auth_request for protected API routes.
        location = /_auth_check {
            internal;
            proxy_pass http://frontend/api/internal/auth-guard;
            proxy_http_version 1.1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token $http_x_medrix_admin_token;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;
        }

        # Frontend auth/session routes must stay on Next.js, not the gateway catch-all.
        location ^~ /api/auth/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/session/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # LangGraph API routes
        # Rewrites /api/langgraph/* to /* before proxying
        location /api/langgraph/ {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            rewrite ^/api/langgraph/(.*) /$1 break;
            proxy_pass http://langgraph;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';

            # SSE/Streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;

            # Timeouts for long-running requests
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            # Chunked transfer encoding
            chunked_transfer_encoding on;
        }

        # Custom API: Uploads endpoint
        location ~ ^/api/threads/[^/]+/uploads {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Large file upload support
            client_max_body_size 100M;
            proxy_request_buffering off;
        }

        # Gateway run stream endpoint (SSE)
        location ~ ^/api/threads/[^/]+/runs/stream$ {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_set_header X-Accel-Buffering no;

            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        # Provisioner API (if enabled)
        location /api/sandboxes {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            set $provisioner_upstream provisioner:6204;
            proxy_pass http://$provisioner_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other gateway API endpoints
        location /api/ {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Allow slower setup/model validation requests to complete instead
            # of hitting nginx's default 60s upstream timeout.
            proxy_connect_timeout 180s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        # API Documentation: Swagger UI
        location /docs {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Documentation: ReDoc
        location /redoc {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Documentation: OpenAPI Schema
        location /openapi.json {
            auth_request /_auth_check;
            auth_request_set $medrix_proxy_auth $upstream_http_x_medrix_proxy_authorized;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Medrix-Admin-Token "";
            proxy_set_header X-Medrix-Proxy-Authorized $medrix_proxy_auth;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint (gateway)
        location /health {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other requests go to frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}
